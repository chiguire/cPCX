- hosts: vps
  tasks:
    - name: Update apt cache
      become: true
      apt:
        update_cache: yes

    - name: Uninstall nginx if present
      become: true
      apt:
        name: nginx
        state: absent
        purge: yes

    - name: Install required packages
      become: true
      apt:
        name: [git,
               ufw,
               uidmap,
               ca-certificates,
               curl,
               python3-pip, python3-packaging, python3-requests]
        state: present

    - name: Create /etc/apt/keyrings directory
      become: true
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      become: true
      shell: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker apt repository
      become: true
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repository
      become: true
      apt:
        update_cache: yes

    - name: Install Docker CE packages
      become: true
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Disable root Docker service and socket
      become: true
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - docker.service
        - docker.socket

    - name: Remove root Docker socket
      become: true
      file:
        path: /var/run/docker.sock
        state: absent

    - name: Set up rootless Docker
      shell: curl -fsSL https://get.docker.com/rootless | sh
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ ansible_user_uid }}

    - name: Enable rootless Docker and start on boot
      shell: systemctl --user enable --now docker
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ ansible_user_uid }}

    - name: Allow unprivileged port binding from port 80
      become: true
      sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        sysctl_file: /etc/sysctl.conf
        reload: yes

    - name: Enable linger so rootless Docker starts at boot
      become: true
      shell: loginctl enable-linger {{ ansible_user }}

    - name: Copy Github SSH private key to ~/.ssh
      copy:
        src: "{{ github_ssh_private_key_path }}"
        dest: "~/.ssh/id_ed25519"
        mode: '0600'

    - name: Clone repository
      git:
        repo: "{{ github_repo }}"
        dest: ~/app
        version: release
        accept_hostkey: yes
        force: true
        key_file: ~/.ssh/id_ed25519

    - name: Empty Migrations directory
      file:
        path: ~/app/cpcx/Migrations
        state: "{{ item }}"
      loop:
        - absent
        - directory

    - name: Render nginx config
      template:
        src: "{{ playbook_dir }}/../docker/nginx/nginx.conf.j2"
        dest: ~/app/deploy/docker/nginx/nginx.conf

    - name: Pull Docker images
      community.docker.docker_image:
        name: "{{ item }}"
        source: pull
        docker_host: "unix:///run/user/{{ ansible_user_uid }}/docker.sock"
      loop:
        - postgres:17
        - mcr.microsoft.com/dotnet/sdk:10.0
        - mcr.microsoft.com/dotnet/aspnet:10.0-alpine
        - nginx:alpine

    - name: Generate postgres password
      set_fact:
        postgres_password: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Write .env file
      copy:
        dest: ~/app/deploy/docker/.env
        mode: '0600'
        content: |
          POSTGRES_DB={{ postgres_db }}
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_DATA_PATH={{ postgres_data_path }}
          CPCX_PROJECT_PATH=cpcx

    - name: Delete postgres data directory
      become: true
      file:
        path: "{{ postgres_data_path }}"
        state: absent

    - name: Ensure init-db.sh is executable
      file:
        path: ~/app/deploy/docker/init-db.sh
        mode: '0700'

    - name: Initialise database
      shell:
        cmd: ~/app/deploy/docker/init-db.sh InitialMigration
        chdir: ~/app/deploy/docker

    - name: Install snapd
      become: true
      apt:
        name: snapd
        state: present

    - name: Install certbot via snap
      become: true
      community.general.snap:
        name: certbot
        classic: yes

    - name: Create certbot symlink
      become: true
      file:
        src: /snap/bin/certbot
        dest: /usr/bin/certbot
        state: link

    - name: Obtain SSL certificates
      become: true
      command: >
        certbot certonly --standalone --non-interactive --agree-tos
        --email {{ certbot_email }}
        -d {{ domain_apex }}
        -d {{ domain_emf }}
      args:
        creates:
          - /etc/letsencrypt/live/{{ domain_apex }}/fullchain.pem
          - /etc/letsencrypt/live/{{ domain_emf }}/fullchain.pem

    - name: Create ~/letsencrypt/live directories
      file:
        path: ~/letsencrypt/live/{{ item }}
        state: directory
        mode: '0755'
      loop:
        - "{{ domain_apex }}"
        - "{{ domain_emf }}"

    - name: Copy SSL certificates (dereference symlinks) and set ownership
      become: true
      shell: |
        cp -L /etc/letsencrypt/live/{{ item }}/*.pem /home/{{ ansible_user }}/letsencrypt/live/{{ item }}/
      loop:
        - "{{ domain_apex }}"
        - "{{ domain_emf }}"

    - name: Chown letsencrypt copy to ansible_user
      become: true
      file:
        path: /home/{{ ansible_user }}/letsencrypt
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        recurse: yes

    - name: Schedule certbot renewal
      become: true
      cron:
        name: certbot renew
        minute: "30"
        hour: "5"
        job: >-
          certbot renew --quiet &&
          cp -L /etc/letsencrypt/live/{{ domain_apex }}/*.pem /home/{{ ansible_user }}/letsencrypt/live/{{ domain_apex }}/ &&
          cp -L /etc/letsencrypt/live/{{ domain_emf }}/*.pem /home/{{ ansible_user }}/letsencrypt/live/{{ domain_emf }}/ &&
          chown -R {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/letsencrypt
        user: root

    - name: Open SSH, HTTP and HTTPS ports
      become: true
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"
        - "80"
        - "443"

    - name: Enable ufw
      become: true
      community.general.ufw:
        state: enabled

    - name: Create user systemd directory
      file:
        path: ~/.config/systemd/user
        state: directory
        mode: '0755'

    - name: Install cpcx user systemd service
      copy:
        dest: ~/.config/systemd/user/cpcx.service
        mode: '0644'
        content: |
          [Unit]
          Description=CPCX Application (Docker Compose)
          After=network.target docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory=/home/{{ ansible_user }}/app/deploy/docker
          EnvironmentFile=/home/{{ ansible_user }}/app/deploy/docker/.env
          ExecStart=/usr/bin/docker compose -f {{ compose_file }} up -d --build
          ExecStop=/usr/bin/docker compose -f {{ compose_file }} down

          [Install]
          WantedBy=default.target

    - name: Enable and start cpcx user service
      shell: |
        systemctl --user daemon-reload
        systemctl --user enable --now cpcx
      environment:
        XDG_RUNTIME_DIR: /run/user/{{ ansible_user_uid }}
