services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cpcx}
      POSTGRES_USER: ${POSTGRES_USER:-cpcx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${POSTGRES_DATA_PATH:-~/postgres}:/var/lib/postgresql/data
    networks:
      - backend

  cpcx:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.cpcx
      args:
        PROJECT_PATH: ${CPCX_PROJECT_PATH:-cpcx}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-cpcx};
        Username=${POSTGRES_USER:-cpcx};
        Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    depends_on:
      - postgres
    networks:
      - backend

networks:
  backend:
    driver: bridge
