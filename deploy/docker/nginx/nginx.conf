events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Redirect all HTTP to HTTPSi
    server {
        listen 80;
        server_name www.deerpost.cx emf.deerpost.cx;
        return 301 https://$host$request_uri;
    }

    # Static site — apex domain
    server {
        listen 443 ssl;
        server_name deerpost.cx;

        # Certbot places certs under /etc/letsencrypt/live/<domain>/
        ssl_certificate     /etc/letsencrypt/live/www.deerpost.cx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.deerpost.cx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        root  /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Reverse proxy — emf subdomain → cpcx
    server {
        listen 443 ssl;
        server_name emf.deerpost.cx;

        # If emf.deerpost.cx has its own cert, point here; otherwise use the
        # apex cert if it covers this subdomain (SAN / wildcard).
        ssl_certificate     /etc/letsencrypt/live/emf.deerpost.cx/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/emf.deerpost.cx/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://cpcx:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
