services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cpcx}
      POSTGRES_USER: ${POSTGRES_USER:-cpcx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cpcxdev}
    volumes:
      - ${POSTGRES_DATA_PATH:-~/postgres}:/var/lib/postgresql/data
    networks:
      - backend

  cpcx:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.cpcx
      args:
        PROJECT_PATH: ${CPCX_PROJECT_PATH:-cpcx}
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;
        Database=${POSTGRES_DB:-cpcx};
        Username=${POSTGRES_USER:-cpcx};
        Password=${POSTGRES_PASSWORD:-cpcxdev}
    depends_on:
      - postgres
    networks:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - cpcx
    networks:
      - backend

networks:
  backend:
    driver: bridge
